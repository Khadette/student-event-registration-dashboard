<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Event Registration Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Toast popup animation */
    #toast {
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    #toast.hide {
      opacity: 0;
      transform: translateY(30px);
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

  <!-- TOAST POPUP -->
  <div
    id="toast"
    class="hide fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-lg shadow-lg text-white text-sm font-semibold pointer-events-none"
    style="min-width: 220px; text-align: center;"
  ></div>

  <!-- NAVBAR -->
  <nav class="bg-teal-700 text-white shadow-md sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center flex-wrap gap-2">
      <h1 class="text-xl font-bold tracking-wide">📋 EventReg</h1>
      <input
        id="searchInput"
        type="text"
        placeholder="🔍 Search events..."
        class="px-3 py-1 rounded-md text-slate-800 bg-white border border-teal-300 w-full sm:w-64 focus:outline-none focus:ring-2 focus:ring-teal-300"
        oninput="searchEvents()"
      />
    </div>
  </nav>

  <!-- HERO SECTION -->
  <div class="bg-teal-600 text-white text-center py-10 px-4">
    <h2 class="text-3xl font-bold mb-2">Student Event Registration</h2>
    <p class="text-base max-w-xl mx-auto text-teal-100">
      View upcoming school events, register your spot, and manage your bookings — all in one place.
    </p>
  </div>

  <!-- STATISTICS SECTION -->
  <div class="max-w-6xl mx-auto px-4 mt-6 grid grid-cols-1 sm:grid-cols-3 gap-4">
    <div class="bg-white rounded shadow-sm p-4 text-center">
      <p class="text-slate-500 text-sm mb-1">Total Events</p>
      <p id="statTotalEvents" class="text-4xl font-bold text-teal-600">0</p>
    </div>
    <div class="bg-white rounded shadow-sm p-4 text-center">
      <p class="text-slate-500 text-sm mb-1">Total Registered</p>
      <p id="statTotalRegistered" class="text-4xl font-bold text-indigo-500">0</p>
    </div>
    <div class="bg-white rounded shadow-sm p-4 text-center">
      <p class="text-slate-500 text-sm mb-1">Remaining Seats</p>
      <p id="statTotalSeats" class="text-4xl font-bold text-amber-500">0</p>
    </div>
  </div>

  <!-- ADD EVENT FORM -->
  <div class="max-w-6xl mx-auto px-4 mt-6">
    <div class="bg-white rounded shadow-sm border border-slate-200 p-6">
      <h3 class="text-lg font-bold mb-4 text-slate-700 border-b pb-2">➕ Add New Event</h3>
      <div id="formError" class="hidden bg-red-50 text-red-600 border border-red-300 rounded px-4 py-2 mb-4 text-sm"></div>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <input
          id="inputTitle"
          type="text"
          placeholder="Event Title"
          class="border border-slate-300 rounded-md px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-teal-400"
        />
        <select id="inputCategory" class="border border-slate-300 rounded-md px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 text-slate-700">
          <option value="">-- Select Category --</option>
          <option value="Technology">Technology</option>
          <option value="Science">Science</option>
          <option value="Arts">Arts</option>
          <option value="Sports">Sports</option>
          <option value="Business">Business</option>
          <option value="Health">Health</option>
          <option value="Other">Other</option>
        </select>
        <input
          id="inputSeats"
          type="number"
          placeholder="Number of Seats"
          min="1"
          class="border border-slate-300 rounded-md px-3 py-2 w-full text-sm focus:outline-none focus:ring-2 focus:ring-teal-400"
        />
      </div>
      <button
        onclick="addEvent()"
        class="mt-4 bg-teal-600 hover:bg-teal-700 active:scale-95 text-white font-bold px-6 py-2 rounded-md text-sm transition-all"
      >
        + Add Event
      </button>
    </div>
  </div>

  <!-- EVENT DISPLAY AREA -->
  <div class="max-w-6xl mx-auto px-4 mt-6 mb-12">
    <h3 class="text-lg font-bold text-slate-700 mb-4">🗓 Available Events</h3>
    <div id="eventContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- Cards go here -->
    </div>
    <p id="noEventsMsg" class="hidden text-center text-slate-400 mt-12 text-base">No events found.</p>
  </div>

 <script src="script.js"></script>

</body>
</html>
